apis:
  - aid: scispot:scispot-api
    name: Scispot API
    description: >-
      The Scispot REST API provides programmatic access to all laboratory data
      management features including Labsheets (LIMS), Electronic Lab Notebooks
      (ELN), Manifests (plates, boxes, racks), and Sequences. Authenticated via
      personal API tokens, the API supports creating, reading, updating, and
      searching lab records, samples, barcodes, experimental results, and
      biological sequences. The API follows a flat, consistent schema designed
      for computational biology and dry-lab automation.
