aid: scispot
name: Scispot
description: >-
  Scispot is a cloud-native laboratory data platform and operating system for
  modern life science labs. It provides an API-first architecture combining
  Electronic Lab Notebook (ELN) and Laboratory Information Management System
  (LIMS) capabilities with over 250 pre-built instrument connectors and 7,000+
  application integrations via its GLUE layer. Labs use Scispot to centralize
  and activate their data, automate experiment workflows, manage samples,
  sequences, and chemical structures programmatically, and integrate with
  clinical data standards including HL7 FHIR, HL7 v2, and ASTM protocols.
