naftiko: 1.0.0-alpha2
info:
  label: Scispot API — Sequences
  description: 'Scispot API — Sequences. 4 operations. Lead operation: List Sequences. Self-contained Naftiko capability covering
    one Scispot business surface.'
  tags:
  - Scispot
  - Sequences
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SCISPOT_API_KEY: SCISPOT_API_KEY
capability:
  consumes:
  - type: http
    namespace: scispot-sequences
    baseUri: https://api.scispot.com/v1
    description: Scispot API — Sequences business capability. Self-contained, no shared references.
    resources:
    - name: sequences
      path: /sequences
      operations:
      - name: listsequences
        method: GET
        description: List Sequences
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: type
          in: query
          type: string
          description: Filter by sequence type
        - name: page
          in: query
          type: integer
          description: Page number for pagination
        - name: limit
          in: query
          type: integer
          description: Number of sequences per page
      - name: createsequence
        method: POST
        description: Create Sequence
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: sequences-sequenceId
      path: /sequences/{sequenceId}
      operations:
      - name: getsequence
        method: GET
        description: Get Sequence
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sequenceId
          in: path
          type: string
          description: Unique identifier of the sequence
          required: true
      - name: updatesequence
        method: PUT
        description: Update Sequence
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sequenceId
          in: path
          type: string
          description: Unique identifier of the sequence
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: apiKey
      value: '{{env.SCISPOT_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: scispot-sequences-rest
    port: 8080
    description: REST adapter for Scispot API — Sequences. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/sequences
      name: sequences
      description: REST surface for sequences.
      operations:
      - method: GET
        name: listsequences
        description: List Sequences
        call: scispot-sequences.listsequences
        with:
          type: rest.type
          page: rest.page
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createsequence
        description: Create Sequence
        call: scispot-sequences.createsequence
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/sequences/{sequenceid}
      name: sequences-sequenceid
      description: REST surface for sequences-sequenceId.
      operations:
      - method: GET
        name: getsequence
        description: Get Sequence
        call: scispot-sequences.getsequence
        with:
          sequenceId: rest.sequenceId
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatesequence
        description: Update Sequence
        call: scispot-sequences.updatesequence
        with:
          sequenceId: rest.sequenceId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: scispot-sequences-mcp
    port: 9090
    transport: http
    description: MCP adapter for Scispot API — Sequences. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-sequences
      description: List Sequences
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: scispot-sequences.listsequences
      with:
        type: tools.type
        page: tools.page
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: create-sequence
      description: Create Sequence
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: scispot-sequences.createsequence
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-sequence
      description: Get Sequence
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: scispot-sequences.getsequence
      with:
        sequenceId: tools.sequenceId
      outputParameters:
      - type: object
        mapping: $.
    - name: update-sequence
      description: Update Sequence
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: scispot-sequences.updatesequence
      with:
        sequenceId: tools.sequenceId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
