naftiko: "1.0.0-alpha1"

info:
  label: "Scispot Laboratory API"
  description: >-
    API-first laboratory data platform providing programmatic access to ELN,
    LIMS (Labsheets), Manifests (plates, boxes, racks), and biological Sequences.
    Used by biotech and life science labs to automate workflows, manage samples,
    and integrate with instruments and computational pipelines.
  tags:
    - Laboratory
    - Life Science
    - LIMS
    - ELN
    - Biotech
    - Samples
    - Sequences
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SCISPOT_API_KEY: SCISPOT_API_KEY

capability:
  consumes:
    - type: http
      namespace: scispot
      baseUri: https://api.scispot.com/v1
      description: "Scispot laboratory data platform API"
      authentication:
        type: apikey
        key: apiKey
        value: "{{SCISPOT_API_KEY}}"
        placement: header
      resources:
        - name: labsheets
          path: /labsheets
          description: "List all labsheets in the workspace"
          operations:
            - name: list-labsheets
              method: GET
              description: "Retrieve all LIMS-style data tables"
              inputParameters:
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Results per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: labsheet-rows
          path: /labsheets/{labsheetId}/rows
          description: "Manage rows within a specific labsheet"
          operations:
            - name: get-labsheet-rows
              method: GET
              description: "Retrieve all rows from a labsheet"
              inputParameters:
                - name: labsheetId
                  in: path
                  type: string
                  required: true
                  description: "Labsheet identifier"
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Rows per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: add-labsheet-row
              method: POST
              description: "Add a new data row to a labsheet"
              inputParameters:
                - name: labsheetId
                  in: path
                  type: string
                  required: true
                  description: "Labsheet identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  barcode: "{{tools.barcode}}"
                  data: "{{tools.data}}"

        - name: labsheet-row
          path: /labsheets/{labsheetId}/rows/{rowId}
          description: "Manage a specific labsheet row"
          operations:
            - name: get-labsheet-row
              method: GET
              description: "Get a specific row by ID"
              inputParameters:
                - name: labsheetId
                  in: path
                  type: string
                  required: true
                  description: "Labsheet identifier"
                - name: rowId
                  in: path
                  type: string
                  required: true
                  description: "Row identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: update-labsheet-row
              method: PUT
              description: "Update an existing labsheet row"
              inputParameters:
                - name: labsheetId
                  in: path
                  type: string
                  required: true
                  description: "Labsheet identifier"
                - name: rowId
                  in: path
                  type: string
                  required: true
                  description: "Row identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  data: "{{tools.data}}"

            - name: delete-labsheet-row
              method: DELETE
              description: "Delete a row from a labsheet"
              inputParameters:
                - name: labsheetId
                  in: path
                  type: string
                  required: true
                  description: "Labsheet identifier"
                - name: rowId
                  in: path
                  type: string
                  required: true
                  description: "Row identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: barcode-search
          path: /results/search/{barcode}
          description: "Search results by barcode"
          operations:
            - name: search-by-barcode
              method: GET
              description: "Find all records associated with a barcode"
              inputParameters:
                - name: barcode
                  in: path
                  type: string
                  required: true
                  description: "Barcode identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: eln-notebooks
          path: /eln/notebooks
          description: "Manage ELN notebooks"
          operations:
            - name: list-notebooks
              method: GET
              description: "List all ELN notebooks"
              inputParameters:
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Results per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: notebook-entries
          path: /eln/notebooks/{notebookId}/entries
          description: "Manage entries within an ELN notebook"
          operations:
            - name: list-notebook-entries
              method: GET
              description: "List all entries in a notebook"
              inputParameters:
                - name: notebookId
                  in: path
                  type: string
                  required: true
                  description: "Notebook identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-notebook-entry
              method: POST
              description: "Create a new notebook entry (experiment, protocol, or observation)"
              inputParameters:
                - name: notebookId
                  in: path
                  type: string
                  required: true
                  description: "Notebook identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  title: "{{tools.title}}"
                  type: "{{tools.entry_type}}"
                  content: "{{tools.content}}"

        - name: manifests
          path: /manifests
          description: "Manage physical container manifests"
          operations:
            - name: list-manifests
              method: GET
              description: "List all manifests (plates, boxes, racks)"
              inputParameters:
                - name: type
                  in: query
                  type: string
                  required: false
                  description: "Container type filter (plate, box, rack)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-manifest
              method: POST
              description: "Create a new physical container manifest"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  type: "{{tools.container_type}}"
                  barcode: "{{tools.barcode}}"

        - name: manifest-detail
          path: /manifests/{manifestId}
          description: "Get a specific manifest by ID"
          operations:
            - name: get-manifest
              method: GET
              description: "Retrieve a single manifest with its contents"
              inputParameters:
                - name: manifestId
                  in: path
                  type: string
                  required: true
                  description: "Manifest identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: sequences
          path: /sequences
          description: "Manage biological sequences"
          operations:
            - name: list-sequences
              method: GET
              description: "List all biological sequences (DNA, RNA, protein, chemical)"
              inputParameters:
                - name: type
                  in: query
                  type: string
                  required: false
                  description: "Sequence type filter (dna, rna, protein, chemical)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-sequence
              method: POST
              description: "Add a new biological sequence with annotations"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  type: "{{tools.sequence_type}}"
                  sequence: "{{tools.sequence}}"

        - name: sequence-detail
          path: /sequences/{sequenceId}
          description: "Manage a specific sequence by ID"
          operations:
            - name: get-sequence
              method: GET
              description: "Retrieve a single sequence with annotations"
              inputParameters:
                - name: sequenceId
                  in: path
                  type: string
                  required: true
                  description: "Sequence identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: update-sequence
              method: PUT
              description: "Update an existing biological sequence"
              inputParameters:
                - name: sequenceId
                  in: path
                  type: string
                  required: true
                  description: "Sequence identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  sequence: "{{tools.sequence}}"

  exposes:
    - type: rest
      port: 8100
      namespace: scispot-api
      resources:
        - path: /v1/labsheets
          name: labsheets
          description: "List labsheets"
          operations:
            - method: GET
              name: list-labsheets
              description: "List all LIMS labsheets"
              call: "scispot.list-labsheets"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/labsheets/{labsheetId}/rows
          name: labsheet-rows
          description: "Manage labsheet rows"
          operations:
            - method: GET
              name: get-labsheet-rows
              description: "Get all rows from a labsheet"
              call: "scispot.get-labsheet-rows"
              with:
                labsheetId: "rest.labsheetId"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: add-labsheet-row
              description: "Add a row to a labsheet"
              call: "scispot.add-labsheet-row"
              with:
                labsheetId: "rest.labsheetId"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/sequences
          name: sequences
          description: "Manage biological sequences"
          operations:
            - method: GET
              name: list-sequences
              description: "List all sequences"
              call: "scispot.list-sequences"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-sequence
              description: "Create a new sequence"
              call: "scispot.create-sequence"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: scispot-mcp
      transport: http
      tools:
        - name: list-labsheets
          description: "List all Scispot LIMS labsheets in the workspace"
          hints:
            readOnly: true
            idempotent: true
          call: "scispot.list-labsheets"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-labsheet-rows
          description: "Retrieve all rows from a specific Scispot labsheet"
          hints:
            readOnly: true
            idempotent: true
          call: "scispot.get-labsheet-rows"
          with:
            labsheetId: "tools.labsheetId"
          outputParameters:
            - type: object
              mapping: "$."

        - name: add-labsheet-row
          description: "Add a new data row to a Scispot labsheet with optional barcode"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "scispot.add-labsheet-row"
          with:
            labsheetId: "tools.labsheetId"
            barcode: "tools.barcode"
            data: "tools.data"
          outputParameters:
            - type: object
              mapping: "$."

        - name: search-by-barcode
          description: "Search all Scispot results by sample barcode"
          hints:
            readOnly: true
            idempotent: true
          call: "scispot.search-by-barcode"
          with:
            barcode: "tools.barcode"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-sequences
          description: "List all biological sequences (DNA, RNA, protein) in the workspace"
          hints:
            readOnly: true
            idempotent: true
          call: "scispot.list-sequences"
          outputParameters:
            - type: object
              mapping: "$."

        - name: create-sequence
          description: "Add a new biological sequence (DNA, RNA, protein, or chemical) to the Scispot database"
          hints:
            readOnly: false
            destructive: false
          call: "scispot.create-sequence"
          with:
            name: "tools.name"
            sequence_type: "tools.sequence_type"
            sequence: "tools.sequence"
          outputParameters:
            - type: object
              mapping: "$."
